name: chaq-production

x-server-environment: &server-environment
  NODE_ENV: production
  DATABASE_URL: postgresql://${POSTGRES_USER:-chaq}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-chaq}?schema=public
  REDIS_URL: redis://redis:6379
  SERVER_HOST: 0.0.0.0
  SERVER_PORT: 24537
  CLIENT_ORIGIN: ${CLIENT_ORIGIN:?set CLIENT_ORIGIN}
  MODEL_SECRET_KEY: ${MODEL_SECRET_KEY:?set MODEL_SECRET_KEY}
  AGENT_WORKER_CONCURRENCY: ${AGENT_WORKER_CONCURRENCY:-4}
  MODEL_REQUEST_TIMEOUT_MS: ${MODEL_REQUEST_TIMEOUT_MS:-60000}
  SMTP_HOST: ${SMTP_HOST:?set SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT:-465}
  SMTP_USER: ${SMTP_USER:?set SMTP_USER}
  SMTP_PASS: ${SMTP_PASS:?set SMTP_PASS}
  SMTP_FROM: ${SMTP_FROM:?set SMTP_FROM}
  SMTP_SECURE: ${SMTP_SECURE:-1}
  SMTP_STARTTLS: ${SMTP_STARTTLS:-0}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chaq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-chaq}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chaq} -d ${POSTGRES_DB:-chaq}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment: *server-environment
    command: ["./node_modules/.bin/prisma", "migrate", "deploy", "--schema", "apps/server/prisma/schema.prisma"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment: *server-environment
    command: ["node", "apps/server/dist/src/main.js"]
    ports:
      - "${PUBLIC_API_PORT:-24537}:24537"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:24537/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    environment: *server-environment
    command: ["node", "apps/server/dist/src/worker.js"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
